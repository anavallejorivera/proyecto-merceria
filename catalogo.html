<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Responsive</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
  <link href="assets/css/catalogo.css" rel="stylesheet">
</head>
<body>

  <!-- Encabezado del catálogo -->
  <section class="catalogo-header text-center mb-5">
    <div class="container">
      <h2 class="titulo-catalogo">Nuestro Catálogo</h2>
      <p class="subtitulo-catalogo">Descubre todo lo que necesitas para tus proyectos creativos</p>
    </div>
  </section>

  <div class="container my-5">
    <div class="row g-4">
      
      <!-- Tarjeta Manualidades y Decoración -->
      <div class="col-12 col-lg-4">
        <a href="#" class="text-decoration-none text-reset d-block h-100">
          <div class="card h-100 card-hover-up">
            <div class="card-bg bg-manualidades">
              <div class="card-content">
                <h5 class="card-title mb-2">
                  <svg class="icono-catalogo" xmlns="http://www.w3.org/2000/svg">
                    <use href="assets/img/sprite.svg#clock"></use>
                  </svg>
                  Manualidades y Decoración
                </h5>
                <span class="fw-semibold text-white">Explorar productos →</span>
              </div>
            </div>
          </div>
        </a>
      </div>

      <!-- Tarjeta Textil y Labores -->
      <div class="col-12 col-lg-4">
        <a href="#" class="text-decoration-none text-reset d-block h-100">
          <div class="card h-100 card-hover-up">
            <div class="card-bg bg-textil">
              <div class="card-content">
                <h5 class="card-title mb-2">
                  <svg class="icono-catalogo" xmlns="http://www.w3.org/2000/svg">
                    <use href="assets/img/sprite.svg#heart"></use>
                  </svg>
                  Textil y Labores
                </h5>
                <span class="fw-semibold text-white">Explorar productos →</span>
              </div>
            </div>
          </div>
        </a>
      </div>

      <!-- Tarjeta Mercería y Bisutería -->
      <div class="col-12 col-lg-4">
        <a href="#" class="text-decoration-none text-reset d-block h-100">
          <div class="card h-100 card-hover-up">
            <div class="card-bg bg-merceria">
              <div class="card-content">
                <h5 class="card-title mb-2">
                  <svg class="icono-catalogo" xmlns="http://www.w3.org/2000/svg">
                    <use href="assets/img/sprite.svg#lamp"></use>
                  </svg>
                  Mercería y Bisutería
                </h5>
                <span class="fw-semibold text-white">Explorar productos →</span>
              </div>
            </div>
          </div>
        </a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

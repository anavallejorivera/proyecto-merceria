<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
 
<style>
.form-control.is-invalid, .was-validated .form-control:invalid, .form-control.is-valid, .was-validated .form-control:valid {
  
    background-image: initial;
}
.grecaptcha-badge{
  visibility: hidden;
}
</style>
 <script src='https://www.google.com/recaptcha/api.js?render=6LcLEUQsAAAAAPqJwHlK-jDVaM82pHlQpAwsRrf8'> 
</script>
<script>
grecaptcha.ready(function() {
grecaptcha.execute('6LcLEUQsAAAAAPqJwHlK-jDVaM82pHlQpAwsRrf8', {action: 'formulario'})
.then(function(token) {
var recaptchaResponse = document.getElementById('recaptchaResponse');
recaptchaResponse.value = token;
});});
</script>
</head>
  <body>
    <div class="container-lg">
    <form action="07-proceso-ajax.php" method="post" class="row g-3 needs-validation" novalidate>
  <div class="col-md">
    <label for="fname" class="form-label">First name</label>
    <input type="text" class="form-control" id="fname" name="fname" required>
       <div class="invalid-feedback">
        Campo obligatorio.
      </div>
  </div>
  <div class="col-md">
    <label for="lname" class="form-label">Last name</label>
    <input type="text" class="form-control" id="lname" name="lname" required>
       <div class="invalid-feedback">
        Campo obligatorio.
      </div>
  </div>
  <div class="col-12">
     <label for="comentarios" class="form-label">Comentarios</label>
    <textarea class="form-control" id="comentarios" name="comentarios" required></textarea>
       <div class="invalid-feedback">
        Campo obligatorio.
      </div>
  </div>
  
 
  <div class="col-12">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="privacidad" required>
      <label class="form-check-label" for="privacidad">
       Acepto la política de privacidad
      </label>
      <div class="invalid-feedback">
        Campo obligatorio
      </div>
    </div>
  </div>
  <input type="hidden" name="recaptcha_response" id="recaptchaResponse">
  <p class="form-text">
  reCAPTCHA invisible de Google <a href="https://policies.google.com/privacy" target="_blank">Política de privacidad</a> y <a href="https://policies.google.com/terms" target="_blank">Condiciones de uso</a>.
  </p>
  <div class="col-12">
    <button class="btn btn-primary" type="submit">Submit form</button>
  </div>

</form>
<div class="feedback"></div>
</div>
